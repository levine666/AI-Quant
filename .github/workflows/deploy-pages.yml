name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest stock data
        run: |
          pip install "akshare>=1.18.0" "pandas>=2.0.0" "pyyaml>=6.0"
          python fetch_smic.py

      - name: Sync AI-Quant apps and registry
        run: python AI-Quant/scripts/sync_data.py

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r AI-Quant/index.html _site/index.html
          cp -r AI-Quant/apps _site/apps
          cp -r AI-Quant/shared _site/shared
          cp -r AI-Quant/ah-compare _site/ah-compare
          cp -r AI-Quant/indicator-lab _site/indicator-lab
          cp -r AI-Quant/strategy-lab _site/strategy-lab
          cp -r AI-Quant/turtle-lab _site/turtle-lab
          cp -r AI-Quant/data _site/data
          cp .nojekyll _site/
          for d in ah-compare indicator-lab strategy-lab turtle-lab; do
            cp .nojekyll _site/$d/
          done
          # 根目录 dashboard 重定向到 ah-compare（兼容旧链接）
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=ah-compare/"><title>Redirect</title></head><body><a href="ah-compare/">A/H 对比</a></body></html>' > _site/dashboard.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
