name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest stock data
        run: |
          pip install "akshare>=1.18.0" "pandas>=2.0.0"
          python fetch_smic.py

      - name: Sync indicator-lab data
        run: python AI-Quant/scripts/sync_data.py

      - name: Prepare site
        run: |
          cp dashboard.html index.html
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/
          cp -r data _site/
          cp -r AI-Quant/indicator-lab _site/indicator-lab

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
