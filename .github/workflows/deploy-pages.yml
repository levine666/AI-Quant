name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest stock data
        run: |
          pip install "akshare>=1.18.0" "pandas>=2.0.0"
          python fetch_smic.py

      - name: Sync indicator-lab data
        run: python AI-Quant/scripts/sync_data.py

      - name: Prepare site
        run: |
          cp dashboard.html index.html
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/
          cp -r data _site/
          python AI-Quant/scripts/sync_data.py
          cp -r indicator-lab _site/indicator-lab
          cp .nojekyll _site/indicator-lab/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
