<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中芯国际 A/H 对比分析</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="data/stock_data.js"></script>
  <style>
    :root {
      --bg: #0b0f17;
      --panel: #121826;
      --border: #243049;
      --text: #e8edf7;
      --muted: #8b98b3;
      --up: #ef5350;
      --down: #26a69a;
      --a-color: #5b8def;
      --hk-color: #f5a623;
      --premium-color: #b388ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #152036 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container { max-width: 1360px; margin: 0 auto; }

    header { margin-bottom: 20px; }
    header h1 { font-size: 28px; font-weight: 700; }
    header p { margin-top: 6px; color: var(--muted); font-size: 14px; }
    .site-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .site-nav a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,.03);
    }
    .site-nav a:hover { color: var(--text); border-color: var(--a-color); }
    .site-nav a.active { color: var(--text); border-color: var(--a-color); background: rgba(91,141,239,.12); }

    .market-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .market-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .market-card.a { border-top: 3px solid var(--a-color); }
    .market-card.hk { border-top: 3px solid var(--hk-color); }

    .market-card h2 {
      font-size: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .stat-item .label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .stat-item .value {
      font-size: 16px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .compare-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .compare-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .compare-card .label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 6px;
    }

    .compare-card .value {
      font-size: 17px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }

    .tab.active {
      background: rgba(91, 141, 239, 0.15);
      border-color: var(--a-color);
      color: var(--text);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }

    .view { display: none; }
    .view.active { display: block; }

    .chart { width: 100%; height: 360px; }
    .chart.tall { height: 520px; }
    .chart-row { display: grid; grid-template-columns: 1fr; gap: 0; }

    .up { color: var(--up); }
    .down { color: var(--down); }
    .a-text { color: var(--a-color); }
    .hk-text { color: var(--hk-color); }

    footer {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 960px) {
      body { padding: 14px; }
      .market-stats, .compare-bar { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .chart, .chart.tall { height: 300px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="site-nav">
      <a href="index.html" class="active">A/H 对比</a>
      <a href="AI-Quant/indicator-lab/">Indicator Lab</a>
    </nav>
    <header>
      <h1>中芯国际 A/H 股对比分析</h1>
      <p id="subtitle">加载中...</p>
    </header>

    <div class="market-stats">
      <div class="market-card a">
        <h2><span class="a-text">A股 688981</span> <span class="badge">CNY · 前复权</span></h2>
        <div class="stat-grid" id="a-stats"></div>
      </div>
      <div class="market-card hk">
        <h2><span class="hk-text">港股 00981</span> <span class="badge">HKD · 前复权</span></h2>
        <div class="stat-grid" id="hk-stats"></div>
      </div>
    </div>

    <div class="compare-bar" id="compare-stats"></div>

    <div class="tabs">
      <button class="tab active" data-view="compare">对比分析</button>
      <button class="tab" data-view="a-detail">A股 K线</button>
      <button class="tab" data-view="hk-detail">港股 K线</button>
    </div>

    <section class="panel">
      <div class="view active" id="view-compare">
        <div class="chart-row">
          <div id="chart-index" class="chart"></div>
          <div id="chart-premium" class="chart"></div>
          <div id="chart-volume-compare" class="chart"></div>
        </div>
      </div>
      <div class="view" id="view-a-detail">
        <div id="chart-a" class="chart tall"></div>
      </div>
      <div class="view" id="view-hk-detail">
        <div id="chart-hk" class="chart tall"></div>
      </div>
    </section>

    <footer id="footer-note"></footer>
  </div>

  <script>
    const charts = {};
    const COLORS = {
      a: "#5b8def",
      hk: "#f5a623",
      premium: "#b388ff",
      up: "#ef5350",
      down: "#26a69a",
      grid: "#1b2438",
      axis: "#8b98b3",
      border: "#243049",
    };

    function formatNumber(value, digits = 2) {
      return Number(value).toLocaleString("zh-CN", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits,
      });
    }

    function formatVolume(value) {
      if (value >= 1e8) return (value / 1e8).toFixed(2) + " 亿股";
      if (value >= 1e4) return (value / 1e4).toFixed(2) + " 万股";
      return formatNumber(value, 0) + " 股";
    }

    function changeClass(value) {
      return value >= 0 ? "up" : "down";
    }

    function formatChange(value, pct) {
      const sign = value >= 0 ? "+" : "";
      return `${sign}${formatNumber(value)} (${sign}${formatNumber(pct)}%)`;
    }

    function renderStatGrid(container, latest, prev, unit, periodHigh, periodLow) {
      const change = latest.close - prev.close;
      const changePct = (change / prev.close) * 100;
      container.innerHTML = `
        <div class="stat-item">
          <div class="label">最新收盘</div>
          <div class="value ${changeClass(change)}">${formatNumber(latest.close)} ${unit}</div>
        </div>
        <div class="stat-item">
          <div class="label">日涨跌</div>
          <div class="value ${changeClass(change)}">${formatChange(change, changePct)}</div>
        </div>
        <div class="stat-item">
          <div class="label">区间最高/最低</div>
          <div class="value">${formatNumber(periodHigh)} / ${formatNumber(periodLow)}</div>
        </div>
        <div class="stat-item">
          <div class="label">最新成交量</div>
          <div class="value">${formatVolume(latest.volume)}</div>
        </div>`;
    }

    function baseChartOption() {
      return {
        animation: false,
        backgroundColor: "transparent",
        textStyle: { color: COLORS.axis },
        grid: { left: 58, right: 20, top: 44, bottom: 56 },
        tooltip: {
          trigger: "axis",
          backgroundColor: "rgba(18, 24, 38, 0.95)",
          borderColor: COLORS.border,
          textStyle: { color: "#e8edf7" },
        },
        xAxis: {
          type: "category",
          boundaryGap: false,
          axisLine: { lineStyle: { color: COLORS.border } },
          axisLabel: { color: COLORS.axis },
        },
        yAxis: {
          scale: true,
          splitLine: { lineStyle: { color: COLORS.grid } },
          axisLabel: { color: COLORS.axis },
        },
        dataZoom: [
          { type: "inside", start: 0, end: 100 },
          {
            type: "slider",
            height: 20,
            bottom: 8,
            borderColor: COLORS.border,
            fillerColor: "rgba(91, 141, 239, 0.15)",
            handleStyle: { color: COLORS.a },
            textStyle: { color: COLORS.axis },
            start: 0,
            end: 100,
          },
        ],
      };
    }

    function buildKlineChart(domId, title, data, unit) {
      const dates = data.map((d) => d.date);
      const ohlc = data.map((d) => [d.open, d.close, d.low, d.high]);
      const volumes = data.map((d) => d.volume);
      const volumeColors = data.map((d, i) =>
        i === 0 ? COLORS.axis : d.close >= data[i - 1].close ? COLORS.up : COLORS.down
      );

      const chart = echarts.init(document.getElementById(domId));
      chart.setOption({
        animation: false,
        backgroundColor: "transparent",
        title: {
          text: title,
          left: 8,
          top: 0,
          textStyle: { color: "#e8edf7", fontSize: 14, fontWeight: 600 },
        },
        tooltip: {
          trigger: "axis",
          axisPointer: { type: "cross" },
          backgroundColor: "rgba(18, 24, 38, 0.95)",
          borderColor: COLORS.border,
          textStyle: { color: "#e8edf7" },
          formatter(params) {
            const candle = params.find((p) => p.seriesName === "K线");
            const vol = params.find((p) => p.seriesName === "成交量");
            if (!candle) return "";
            const [open, close, low, high] = candle.data;
            const idx = candle.dataIndex;
            const row = data[idx];
            const prevClose = idx > 0 ? data[idx - 1].close : close;
            const dayChange = close - prevClose;
            const dayPct = ((dayChange / prevClose) * 100).toFixed(2);
            const color = dayChange >= 0 ? COLORS.up : COLORS.down;
            return [
              `<strong>${candle.axisValue}</strong>`,
              `开盘: ${formatNumber(open)} ${unit}`,
              `收盘: <span style="color:${color}">${formatNumber(close)} ${unit}</span>`,
              `最高: ${formatNumber(high)} ${unit}`,
              `最低: ${formatNumber(low)} ${unit}`,
              `涨跌: <span style="color:${color}">${dayChange >= 0 ? "+" : ""}${formatNumber(dayChange)} (${dayChange >= 0 ? "+" : ""}${dayPct}%)</span>`,
              vol ? `成交量: ${formatVolume(vol.data)}` : "",
              row.amount ? `成交额: ${formatNumber(row.amount / 1e8)} 亿` : "",
            ].join("<br/>");
          },
        },
        axisPointer: { link: [{ xAxisIndex: "all" }] },
        grid: [
          { left: 58, right: 20, top: 36, height: "58%" },
          { left: 58, right: 20, top: "72%", height: "16%" },
        ],
        xAxis: [
          {
            type: "category",
            data: dates,
            boundaryGap: true,
            axisLine: { lineStyle: { color: COLORS.border } },
            axisLabel: { color: COLORS.axis },
          },
          {
            type: "category",
            gridIndex: 1,
            data: dates,
            boundaryGap: true,
            axisLabel: { show: false },
            axisLine: { lineStyle: { color: COLORS.border } },
          },
        ],
        yAxis: [
          {
            scale: true,
            splitLine: { lineStyle: { color: COLORS.grid } },
            axisLabel: { color: COLORS.axis },
          },
          {
            scale: true,
            gridIndex: 1,
            splitNumber: 2,
            splitLine: { show: false },
            axisLabel: {
              color: COLORS.axis,
              formatter: (v) => (v >= 1e6 ? (v / 1e6).toFixed(1) + "M" : v),
            },
          },
        ],
        dataZoom: [
          { type: "inside", xAxisIndex: [0, 1], start: 60, end: 100 },
          {
            show: true,
            xAxisIndex: [0, 1],
            type: "slider",
            bottom: 8,
            height: 20,
            borderColor: COLORS.border,
            fillerColor: "rgba(91, 141, 239, 0.15)",
            handleStyle: { color: COLORS.a },
            textStyle: { color: COLORS.axis },
            start: 60,
            end: 100,
          },
        ],
        series: [
          {
            name: "K线",
            type: "candlestick",
            data: ohlc,
            itemStyle: {
              color: COLORS.up,
              color0: COLORS.down,
              borderColor: COLORS.up,
              borderColor0: COLORS.down,
            },
          },
          {
            name: "成交量",
            type: "bar",
            xAxisIndex: 1,
            yAxisIndex: 1,
            data: volumes,
            itemStyle: { color: (p) => volumeColors[p.dataIndex] },
          },
        ],
      });
      return chart;
    }

    function initDashboard() {
      const payload = window.STOCK_DATA;
      if (!payload || !payload.a_share || !payload.hk_share) {
        document.getElementById("subtitle").textContent =
          "未找到数据，请先运行 fetch_smic.py";
        return;
      }

      const { meta, a_share, hk_share, comparison } = payload;
      const aData = a_share.data;
      const hkData = hk_share.data;
      const cmp = comparison.summary || {};

      const aLatest = aData[aData.length - 1];
      const aPrev = aData[aData.length - 2] || aLatest;
      const hkLatest = hkData[hkData.length - 1];
      const hkPrev = hkData[hkData.length - 2] || hkLatest;

      document.getElementById("subtitle").textContent =
        `A股 ${a_share.meta.start_date} ~ ${a_share.meta.end_date} · 港股 ${hk_share.meta.start_date} ~ ${hk_share.meta.end_date} · 重叠 ${cmp.overlap_days || 0} 个交易日`;

      renderStatGrid(
        document.getElementById("a-stats"),
        aLatest,
        aPrev,
        "元",
        Math.max(...aData.map((d) => d.high)),
        Math.min(...aData.map((d) => d.low))
      );
      renderStatGrid(
        document.getElementById("hk-stats"),
        hkLatest,
        hkPrev,
        "港元",
        Math.max(...hkData.map((d) => d.high)),
        Math.min(...hkData.map((d) => d.low))
      );

      document.getElementById("compare-stats").innerHTML = `
        <div class="compare-card">
          <div class="label">A股区间涨跌</div>
          <div class="value ${changeClass(cmp.a_return_pct)}">${cmp.a_return_pct >= 0 ? "+" : ""}${formatNumber(cmp.a_return_pct)}%</div>
        </div>
        <div class="compare-card">
          <div class="label">港股区间涨跌</div>
          <div class="value ${changeClass(cmp.hk_return_pct)}">${cmp.hk_return_pct >= 0 ? "+" : ""}${formatNumber(cmp.hk_return_pct)}%</div>
        </div>
        <div class="compare-card">
          <div class="label">A-H 涨跌差</div>
          <div class="value ${changeClass(cmp.return_spread_pct)}">${cmp.return_spread_pct >= 0 ? "+" : ""}${formatNumber(cmp.return_spread_pct)}%</div>
        </div>
        <div class="compare-card">
          <div class="label">最新 AH 溢价率</div>
          <div class="value">${cmp.latest_ah_premium_pct >= 0 ? "+" : ""}${formatNumber(cmp.latest_ah_premium_pct)}%</div>
        </div>
        <div class="compare-card">
          <div class="label">平均 / 区间 AH 溢价</div>
          <div class="value">${formatNumber(cmp.avg_ah_premium_pct)}% · ${formatNumber(cmp.min_ah_premium_pct)} ~ ${formatNumber(cmp.max_ah_premium_pct)}%</div>
        </div>`;

      document.getElementById("footer-note").textContent =
        `A股: ${a_share.meta.source} · 港股: ${hk_share.meta.source} · 汇率: 中行折算价(100HKD→CNY) · 更新: ${meta.updated_at}`;

      // Comparison charts
      const dates = comparison.dates || [];
      charts.index = echarts.init(document.getElementById("chart-index"));
      charts.index.setOption({
        ...baseChartOption(),
        title: {
          text: "归一化走势对比（起点=100）",
          left: 8,
          textStyle: { color: "#e8edf7", fontSize: 14, fontWeight: 600 },
        },
        legend: {
          data: ["A股 688981", "港股 00981"],
          top: 8,
          right: 16,
          textStyle: { color: COLORS.axis },
        },
        xAxis: { ...baseChartOption().xAxis, data: dates },
        yAxis: {
          ...baseChartOption().yAxis,
          axisLabel: { color: COLORS.axis, formatter: "{value}" },
        },
        series: [
          {
            name: "A股 688981",
            type: "line",
            data: comparison.a_index,
            showSymbol: false,
            lineStyle: { width: 2, color: COLORS.a },
            itemStyle: { color: COLORS.a },
          },
          {
            name: "港股 00981",
            type: "line",
            data: comparison.hk_index,
            showSymbol: false,
            lineStyle: { width: 2, color: COLORS.hk },
            itemStyle: { color: COLORS.hk },
          },
        ],
      });

      charts.premium = echarts.init(document.getElementById("chart-premium"));
      charts.premium.setOption({
        ...baseChartOption(),
        title: {
          text: "AH 溢价率 = A股收盘价 ÷ (H股收盘价 × 汇率) − 1",
          left: 8,
          textStyle: { color: "#e8edf7", fontSize: 14, fontWeight: 600 },
        },
        xAxis: { ...baseChartOption().xAxis, data: dates },
        yAxis: {
          ...baseChartOption().yAxis,
          axisLabel: {
            color: COLORS.axis,
            formatter: (v) => `${v}%`,
          },
        },
        series: [
          {
            name: "AH溢价率",
            type: "line",
            data: comparison.ah_premium,
            showSymbol: false,
            lineStyle: { width: 2, color: COLORS.premium },
            itemStyle: { color: COLORS.premium },
            areaStyle: { color: "rgba(179, 136, 255, 0.12)" },
            markLine: {
              silent: true,
              symbol: "none",
              lineStyle: { color: "#54617a", type: "dashed" },
              data: [{ yAxis: 0 }],
            },
          },
        ],
      });

      charts.volume = echarts.init(document.getElementById("chart-volume-compare"));
      charts.volume.setOption({
        ...baseChartOption(),
        title: {
          text: "成交量对比（重叠交易日）",
          left: 8,
          textStyle: { color: "#e8edf7", fontSize: 14, fontWeight: 600 },
        },
        legend: {
          data: ["A股成交量", "港股成交量"],
          top: 8,
          right: 16,
          textStyle: { color: COLORS.axis },
        },
        xAxis: { ...baseChartOption().xAxis, data: dates },
        yAxis: [
          {
            type: "value",
            name: "A股",
            position: "left",
            splitLine: { lineStyle: { color: COLORS.grid } },
            axisLabel: {
              color: COLORS.a,
              formatter: (v) => (v >= 1e7 ? (v / 1e7).toFixed(0) + "kw" : v),
            },
          },
          {
            type: "value",
            name: "港股",
            position: "right",
            splitLine: { show: false },
            axisLabel: {
              color: COLORS.hk,
              formatter: (v) => (v >= 1e7 ? (v / 1e7).toFixed(0) + "kw" : v),
            },
          },
        ],
        series: [
          {
            name: "A股成交量",
            type: "bar",
            data: comparison.a_volume,
            itemStyle: { color: "rgba(91, 141, 239, 0.65)" },
          },
          {
            name: "港股成交量",
            type: "line",
            yAxisIndex: 1,
            data: comparison.hk_volume,
            showSymbol: false,
            lineStyle: { width: 2, color: COLORS.hk },
            itemStyle: { color: COLORS.hk },
          },
        ],
      });

      charts.a = buildKlineChart("chart-a", "A股 688981 · 日K + 成交量", aData, "元");
      charts.hk = buildKlineChart("chart-hk", "港股 00981 · 日K + 成交量", hkData, "港元");

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
          document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
          tab.classList.add("active");
          document.getElementById(`view-${tab.dataset.view}`).classList.add("active");
          setTimeout(() => Object.values(charts).forEach((c) => c.resize()), 50);
        });
      });

      window.addEventListener("resize", () =>
        Object.values(charts).forEach((c) => c.resize())
      );
    }

    initDashboard();
  </script>
</body>
</html>
