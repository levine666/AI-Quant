<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turtle Lab — 海龟交易法则</title>
  <link rel="stylesheet" href="css/theme.css" />
  <style>
    :root { --accent: #26a69a; }
    .logo span { color: var(--accent); }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .metric { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
    .metric .label { font-size: 10px; color: var(--muted); }
    .metric .value { font-size: 17px; font-weight: 700; }
    .metric.positive .value { color: var(--up); }
    .metric.negative .value { color: var(--down); }
    .chart-block { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
    .chart { width: 100%; height: 340px; }
    .chart.mid { height: 170px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .radio-group label { display: flex; gap: 8px; align-items: center; font-size: 12px; margin-bottom: 6px; }
    .data-badge { font-size: 10px; color: var(--accent); border: 1px solid rgba(38,166,154,.35); padding: 2px 8px; border-radius: 999px; }
    @media (max-width: 900px) { .metrics { grid-template-columns: repeat(2, 1fr); } .grid-2 { grid-template-columns: 1fr; } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body>
  <div id="loading" class="loading-overlay">加载中…</div>
  <div id="toast" class="toast hidden"></div>

  <header class="topbar">
    <div class="logo">🐢 <span>Turtle</span> Lab</div>
    <div class="topbar-meta">Donchian 突破 + ATR 止损 · 浏览器端回测</div>
    <span class="data-badge" id="dataBadge">—</span>
    <nav class="topbar-nav">
      <a href="../">← AI-Quant</a>
      <a href="../ah-compare/">A/H 对比</a>
      <a href="../indicator-lab/">Indicator Lab</a>
      <a href="../strategy-lab/">Strategy Lab</a>
      <a href="./" class="active">Turtle Lab</a>
    </nav>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="section-title">标的</div>
      <div class="field"><label for="stockSelect">股票</label><select id="stockSelect"></select></div>
      <div class="section-title">回测时段</div>
      <div class="field"><label for="startDate">开始</label><input type="date" id="startDate" /></div>
      <div class="field"><label for="endDate">结束</label><input type="date" id="endDate" /></div>
      <div class="field" style="display:flex;gap:6px">
        <button type="button" class="btn btn-ghost" data-preset="1y" style="flex:1">近1年</button>
        <button type="button" class="btn btn-ghost" data-preset="all" style="flex:1">全部</button>
      </div>
      <div class="section-title">海龟系统</div>
      <div class="radio-group">
        <label><input type="radio" name="system" value="system_1" checked /> 系统一 20/10</label>
        <label><input type="radio" name="system" value="system_2" /> 系统二 55/20</label>
        <label><input type="radio" name="system" value="custom" id="systemCustom" /> 自定义</label>
      </div>
      <div class="field"><label for="entryPeriod">入场周期</label><input type="number" id="entryPeriod" value="20" min="5" max="120" /></div>
      <div class="field"><label for="exitPeriod">出场周期</label><input type="number" id="exitPeriod" value="10" min="3" max="60" /></div>
      <div class="field"><label for="atrPeriod">ATR N</label><input type="number" id="atrPeriod" value="20" min="5" max="60" /></div>
      <div class="field"><label for="stopN">止损 ×N</label><input type="range" id="stopN" min="0.5" max="5" step="0.5" value="2" /><span id="stopNVal">2.0</span></div>
      <p class="hint" id="paramError" style="color:#ef5350;font-size:11px"></p>
      <button type="button" class="btn" id="runBtn">▶ 运行回测</button>
    </aside>

    <main class="content">
      <div id="stockBanner" class="stock-banner"></div>
      <div class="metrics" id="metrics"></div>
      <div class="chart-block"><h3 style="font-size:13px;margin-bottom:8px">K 线 · Donchian · 交易点</h3><div id="chartKline" class="chart"></div></div>
      <div class="grid-2">
        <div class="chart-block"><div id="chartEquity" class="chart mid"></div></div>
        <div class="chart-block"><div id="chartAtr" class="chart mid"></div></div>
      </div>
      <div class="chart-block">
        <table class="data-table"><thead><tr><th>买入</th><th>卖出</th><th>买价</th><th>卖价</th><th>收益</th></tr></thead><tbody id="tradesBody"></tbody></table>
      </div>
    </main>
  </div>
  <footer class="footer-note">仅供学习 · Turtle Lab · AI-Quant</footer>
  <script src="js/common.js"></script>
  <script src="js/turtle_engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
